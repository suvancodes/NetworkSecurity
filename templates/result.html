<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="hero-badge">Step 3 of 3</div>
        <h1>Prediction Result</h1>

        <!-- MAIN: Risk Assignment as Primary Result -->
        <div class="risk-level-section">
            <div class="risk-level-badge {{ risk_category }}">
                {{ risk_level }}
            </div>
        </div>

        <!-- Secondary: Prediction Details -->
        <div class="confidence-section">
            <p class="result-text">Model Output: <b>{{ prediction }}</b></p>
            <p class="result-text">Confidence: <b>{{ confidence }}%</b></p>
            <p class="result-meta">Raw prediction: <b>{{ raw_prediction }}</b></p>
            
            <div class="confidence-bar">
                <div class="confidence-fill {% if prediction == 'Phishing' %}phishing{% else %}legitimate{% endif %}" 
                     style="width: {{ confidence }}%">
                </div>
            </div>
        </div>

        <div class="actions-center">
            <a href="/detect" class="btn">Check Another</a>
            <a href="/" class="btn secondary">Home</a>
        </div>
    </div>
</body>
</html>
